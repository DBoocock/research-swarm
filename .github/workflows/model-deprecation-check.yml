name: Model deprecation check

on:
  schedule:
    - cron: '0 9 1 * *'  # 09:00 UTC on the 1st of every month
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/check-model-deprecation.js
        env:
          GH_TOKEN: ${{ github.token }}
